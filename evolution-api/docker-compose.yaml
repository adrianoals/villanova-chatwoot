services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - evolution-redis
      - evolution-postgres
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    env_file:
      - .env
    networks:
      - evolution-net
      - villanova-net

  evolution-manager:
    container_name: evolution_manager
    image: evoapicloud/evolution-manager:latest
    restart: always
    ports:
      - "127.0.0.1:9615:80"
    volumes:
      - ./manager-nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
    networks:
      - evolution-net

  evolution-redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    command: ["postgres", "-c", "max_connections=1000"]
    environment:
      - POSTGRES_DB=evolution_db
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution_pass_2026
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    networks:
      - evolution-net

volumes:
  evolution_instances:
  evolution_redis:
  evolution_pgdata:

networks:
  evolution-net:
    driver: bridge
  villanova-net:
    external: true
